name: Karate Executor

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Karate_API_Test/shadyMeadowsBB

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Karate Tests
        run: mvn test -Dtest=FeaturesTest -Dkarate.env=dev
        continue-on-error: true

      - name: Upload Karate Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: Karate_API_Test/shadyMeadowsBB/target/allure-results
          retention-days: 30
